server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let React Router handle the path.
    location / {
        try_files $uri /index.html;
    }

    # API + websocket proxy. The compose network resolves "api" to the backend.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE — disable buffering so tokens flush in real time.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    location /ws/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # Long cache for static asset hashes; HTML stays uncached.
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
